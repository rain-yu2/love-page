<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索星空</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #2b1055 0%, #7597de 40%, #000000 100%);
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 星星 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 4px white; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .title {
            color: white;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 6px;
            margin-bottom: 60px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            align-items: center;
            max-width: 700px;
        }

        .btn {
            position: relative;
            width: 320px;
            padding: 18px 0;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            color: white;
            font-size: 1.25rem;
            letter-spacing: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.08);
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.05));
            z-index: -1;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.07);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }

        .btn:hover::before {
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn .icon {
            display: inline-block;
            margin-right: 8px;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">✦ 探索星空 ✦</h1>
        <div class="btn-group">
            <a href="love.html" class="btn"><span class="icon">💫</span>星空下的告白</a>
            <a href="guess-number.html" class="btn"><span class="icon">🎲</span>幸运猜数字</a>
            <a href="snake-game.html" class="btn"><span class="icon">🐍</span>经典贪吃蛇</a>
        </div>
    </div>

    <script>
        function createStars() {
            const count = 180;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = (Math.random() * 5) + 's';
                document.body.appendChild(star);
            }
        }
        createStars();
    </script>

</body>
</html>
