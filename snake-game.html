<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #2b1055 0%, #7597de 40%, #000000 100%);
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            touch-action: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); box-shadow: 0 0 4px white; }
        }

        .game-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .score-board {
            color: white;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-shadow: 0 0 12px rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 10px 40px;
            min-width: 200px;
            text-align: center;
        }

        .score-board span {
            color: #7dffb3;
            font-weight: bold;
            font-size: 1.6rem;
        }

        canvas {
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.35);
            box-shadow: 0 0 40px rgba(100, 150, 255, 0.15);
            display: block;
            max-width: 90vw;
            max-height: 70vh;
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 12px;
        }

        .pause-overlay,
        .countdown {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 25;
            border-radius: 12px;
        }

        .pause-overlay.show,
        .countdown.show {
            display: flex;
        }

        .pause-box {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 36px 56px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255,255,255,0.1);
        }

        .pause-box .pause-title {
            font-size: 2.4rem;
            color: white;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            margin-bottom: 12px;
        }

        .pause-box .pause-hint {
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }

        .countdown-number {
            font-size: 8rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 30px #fff, 0 0 60px #ffd700, 0 0 90px #ffd700;
            animation: countPop 0.8s ease-out;
        }

        @keyframes countPop {
            0% { transform: scale(2.5); opacity: 0; }
            40% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.85; }
        }

        .lobby {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            z-index: 30;
        }

        .lobby.hidden {
            display: none;
        }

        .lobby h1 {
            color: white;
            font-size: 2.2rem;
            letter-spacing: 6px;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            font-weight: 300;
        }

        .lobby .high-score {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .lobby .high-score span {
            color: #ffd700;
            font-weight: bold;
            font-size: 1.6rem;
            text-shadow: 0 0 12px rgba(255,215,0,0.4);
        }

        .start-btn {
            padding: 16px 56px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 16px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            font-size: 1.2rem;
            letter-spacing: 4px;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 0 18px rgba(255,255,255,0.08);
        }

        .start-btn:hover {
            transform: scale(1.08);
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border-radius: 12px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            z-index: 20;
        }

        .overlay.show {
            display: flex;
        }

        .overlay h2 {
            color: white;
            font-size: 2.4rem;
            text-shadow: 0 0 20px rgba(255,80,80,0.6);
            letter-spacing: 4px;
        }

        .overlay .final-score {
            color: rgba(255,255,255,0.8);
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .overlay .final-score span {
            color: #7dffb3;
            font-weight: bold;
            font-size: 1.8rem;
        }

        .restart-btn {
            padding: 14px 48px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 14px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            font-size: 1.1rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 0 18px rgba(255,255,255,0.08);
        }

        .restart-btn:hover {
            transform: scale(1.08);
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        /* 虚拟方向键 */
        .dpad {
            display: none;
            gap: 6px;
            margin-top: 6px;
        }

        .dpad-row {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .dpad-btn {
            width: 64px;
            height: 64px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            transition: background 0.15s;
        }

        .dpad-btn:active {
            background: rgba(255,255,255,0.25);
        }

        .dpad-placeholder {
            width: 64px;
            height: 64px;
            visibility: hidden;
        }

        @media (pointer: coarse) {
            .dpad { display: flex; flex-direction: column; align-items: center; }
        }

        /* 移动端悬浮暂停按钮 */
        .mobile-pause-btn {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            width: 48px;
            height: 48px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 14px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            font-size: 1.4rem;
            z-index: 35;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .mobile-pause-btn:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.25);
        }

        .mobile-pause-btn.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="score-board">得分：<span id="scoreDisplay">0</span></div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <button class="mobile-pause-btn" id="mobilePauseBtn">⏸</button>
            <div class="lobby" id="lobby">
                <h1>✦ 贪吃蛇 ✦</h1>
                <div class="high-score">历史最高分：<span id="highScoreDisplay">0</span> 分</div>
                <button class="start-btn" id="startBtn">开始游戏</button>
            </div>
            <div class="countdown" id="countdown"><div class="countdown-number" id="countdownNumber">3</div></div>
            <div class="pause-overlay" id="pauseOverlay">
                <div class="pause-box">
                    <div class="pause-title">⏸ 游戏已暂停</div>
                    <div class="pause-hint">按空格键继续</div>
                </div>
            </div>
            <div class="overlay" id="gameOverlay">
                <h2>游戏结束</h2>
                <div class="final-score">最终得分：<span id="finalScore">0</span></div>
                <button class="restart-btn" id="restartBtn">返回大厅</button>
            </div>
        </div>
        <div class="dpad">
            <div class="dpad-row">
                <div class="dpad-placeholder"></div>
                <button class="dpad-btn" data-dir="up">▲</button>
                <div class="dpad-placeholder"></div>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" data-dir="left">◀</button>
                <button class="dpad-btn" data-dir="down">▼</button>
                <button class="dpad-btn" data-dir="right">▶</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const finalScore = document.getElementById('finalScore');
            const overlay = document.getElementById('gameOverlay');
            const restartBtn = document.getElementById('restartBtn');
            const lobby = document.getElementById('lobby');
            const startBtn = document.getElementById('startBtn');
            const highScoreDisplay = document.getElementById('highScoreDisplay');

            const SIZE = canvas.width;
            const GRID = 20;
            const CELL = SIZE / GRID;

            const BASE_INTERVAL = 140;
            const MIN_INTERVAL = 50;
            const SPEEDUP_EVERY = 3;

            let snake, food, direction, nextDirection, score, gameLoop, running, currentInterval, countdownActive, paused;

            const isMobile = navigator.maxTouchPoints > 0 || window.matchMedia('(pointer: coarse)').matches;
            const mobilePauseBtn = document.getElementById('mobilePauseBtn');
            const pauseHint = document.querySelector('.pause-hint');
            if (isMobile && pauseHint) pauseHint.textContent = '点击右上角按钮继续';

            function updatePauseBtnIcon() {
                if (!isMobile) return;
                mobilePauseBtn.textContent = paused ? '▶' : '⏸';
            }

            function getHighScore() {
                return parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
            }

            function setHighScore(val) {
                localStorage.setItem('snakeHighScore', String(val));
            }

            highScoreDisplay.textContent = getHighScore();

            function initGame() {
                snake = [
                    { x: 10, y: 10 },
                    { x: 9, y: 10 },
                    { x: 8, y: 10 }
                ];
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                running = false;
                paused = false;
                countdownActive = true;
                currentInterval = BASE_INTERVAL;
                scoreDisplay.textContent = '0';
                overlay.classList.remove('show');
                lobby.classList.add('hidden');
                if (isMobile) {
                    mobilePauseBtn.classList.add('show');
                    mobilePauseBtn.textContent = '⏸';
                }
                spawnFood();
                draw();
                if (gameLoop) clearInterval(gameLoop);
                startCountdown();
            }

            function startCountdown() {
                const el = document.getElementById('countdown');
                const num = document.getElementById('countdownNumber');
                let count = 3;

                function show(n) {
                    num.textContent = n;
                    num.style.animation = 'none';
                    void num.offsetHeight;
                    num.style.animation = 'countPop 0.8s ease-out';
                    el.classList.add('show');
                }

                show(count);
                const interval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        show(count);
                    } else {
                        clearInterval(interval);
                        el.classList.remove('show');
                        countdownActive = false;
                        running = true;
                        gameLoop = setInterval(tick, currentInterval);
                    }
                }, 1000);
            }

            function spawnFood() {
                const maxAttempts = 1000;
                for (let i = 0; i < maxAttempts; i++) {
                    const x = Math.floor(Math.random() * GRID);
                    const y = Math.floor(Math.random() * GRID);
                    if (!snake.some(seg => seg.x === x && seg.y === y)) {
                        food = { x, y };
                        return;
                    }
                }
            }

            function tick() {
                if (!running) return;
                direction = nextDirection;

                const head = { ...snake[0] };
                switch (direction) {
                    case 'up':    head.y--; break;
                    case 'down':  head.y++; break;
                    case 'left':  head.x--; break;
                    case 'right': head.x++; break;
                }

                if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
                    gameOver();
                    return;
                }

                if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                    gameOver();
                    return;
                }

                snake.unshift(head);

                if (head.x === food.x && head.y === food.y) {
                    score++;
                    scoreDisplay.textContent = score;
                    spawnFood();
                    adjustSpeed();
                } else {
                    snake.pop();
                }

                draw();
            }

            function adjustSpeed() {
                const length = snake.length;
                const steps = Math.floor((length - 3) / SPEEDUP_EVERY);
                const newInterval = Math.max(MIN_INTERVAL, BASE_INTERVAL - steps * 15);
                if (newInterval !== currentInterval) {
                    currentInterval = newInterval;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(tick, currentInterval);
                }
            }

            function togglePause() {
                if (!running || countdownActive) return;
                const el = document.getElementById('pauseOverlay');
                if (!paused) {
                    paused = true;
                    clearInterval(gameLoop);
                    el.classList.add('show');
                } else {
                    el.classList.remove('show');
                    paused = false;
                    countdownActive = true;
                    startCountdown();
                }
                updatePauseBtnIcon();
            }

            function gameOver() {
                running = false;
                paused = false;
                document.getElementById('pauseOverlay').classList.remove('show');
                clearInterval(gameLoop);
                finalScore.textContent = score;

                const high = getHighScore();
                if (score > high) {
                    setHighScore(score);
                }

                if (isMobile) mobilePauseBtn.classList.remove('show');
                overlay.classList.add('show');
            }

            function backToLobby() {
                overlay.classList.remove('show');
                highScoreDisplay.textContent = getHighScore();
                lobby.classList.remove('hidden');
                if (isMobile) mobilePauseBtn.classList.remove('show');
            }

            function draw() {
                ctx.clearRect(0, 0, SIZE, SIZE);

                ctx.shadowBlur = 12;
                ctx.shadowColor = '#7dffb3';

                snake.forEach((seg, i) => {
                    const x = seg.x * CELL;
                    const y = seg.y * CELL;
                    const pad = 1;
                    const r = 6;

                    const alpha = 1 - i * 0.03;
                    ctx.globalAlpha = Math.max(alpha, 0.4);
                    ctx.fillStyle = i === 0 ? '#7dffb3' : '#5ce68a';
                    ctx.beginPath();
                    ctx.moveTo(x + pad + r, y + pad);
                    ctx.lineTo(x + CELL - pad - r, y + pad);
                    ctx.quadraticCurveTo(x + CELL - pad, y + pad, x + CELL - pad, y + pad + r);
                    ctx.lineTo(x + CELL - pad, y + CELL - pad - r);
                    ctx.quadraticCurveTo(x + CELL - pad, y + CELL - pad, x + CELL - pad - r, y + CELL - pad);
                    ctx.lineTo(x + pad + r, y + CELL - pad);
                    ctx.quadraticCurveTo(x + pad, y + CELL - pad, x + pad, y + CELL - pad - r);
                    ctx.lineTo(x + pad, y + pad + r);
                    ctx.quadraticCurveTo(x + pad, y + pad, x + pad + r, y + pad);
                    ctx.closePath();
                    ctx.fill();
                });

                ctx.globalAlpha = 1;
                ctx.shadowColor = '#ff4466';
                ctx.shadowBlur = 18;

                ctx.fillStyle = '#ff4466';
                ctx.beginPath();
                const fx = food.x * CELL + CELL / 2;
                const fy = food.y * CELL + CELL / 2;
                const fr = CELL / 2 - 2;
                ctx.arc(fx, fy, fr, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
            }

            function setDirection(dir) {
                if (countdownActive || paused) return;
                const opposites = { up: 'down', down: 'up', left: 'right', right: 'left' };
                if (dir !== opposites[direction]) {
                    nextDirection = dir;
                }
            }

            document.addEventListener('keydown', e => {
                if (e.key === ' ') {
                    e.preventDefault();
                    togglePause();
                    return;
                }
                const map = {
                    ArrowUp: 'up', ArrowDown: 'down',
                    ArrowLeft: 'left', ArrowRight: 'right'
                };
                const dir = map[e.key];
                if (dir) {
                    e.preventDefault();
                    setDirection(dir);
                }
            });

            document.querySelectorAll('.dpad-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    setDirection(btn.dataset.dir);
                });
                btn.addEventListener('touchstart', e => {
                    e.preventDefault();
                    setDirection(btn.dataset.dir);
                }, { passive: false });
            });

            startBtn.addEventListener('click', initGame);
            startBtn.addEventListener('touchend', e => {
                e.preventDefault();
                initGame();
            });

            restartBtn.addEventListener('click', backToLobby);
            restartBtn.addEventListener('touchend', e => {
                e.preventDefault();
                backToLobby();
            });

            if (isMobile) {
                mobilePauseBtn.addEventListener('click', e => {
                    e.preventDefault();
                    togglePause();
                });
                mobilePauseBtn.addEventListener('touchend', e => {
                    e.preventDefault();
                    togglePause();
                });
            }

            // 星空背景
            (function createStars() {
                const count = 180;
                for (let i = 0; i < count; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    star.style.left = Math.random() * 100 + 'vw';
                    star.style.top = Math.random() * 100 + 'vh';
                    const size = Math.random() * 3 + 1;
                    star.style.width = size + 'px';
                    star.style.height = size + 'px';
                    star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    star.style.animationDelay = (Math.random() * 5) + 's';
                    document.body.appendChild(star);
                }
            })();
        })();
    </script>
</body>
</html>
